<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - System Route Not Found</title>
    <style>
      :root {
        --bg-color: #050505;
        --text-color: #00d2ff;
        --error-color: #f44336;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Courier New", Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        text-transform: uppercase;
      }
      .container {
        text-align: center;
        position: relative;
      }
      h1 {
        font-size: 6rem;
        margin: 0;
        letter-spacing: 10px;
        animation: glitch 1s linear infinite;
      }
      .error-msg {
        font-size: 1.2rem;
        margin-top: 20px;
        color: var(--error-color);
        border: 1px solid var(--error-color);
        padding: 10px 20px;
        display: inline-block;
      }
      .terminal {
        margin-top: 40px;
        text-align: left;
        font-size: 0.9rem;
        color: #555;
        max-width: 500px;
      }
      .cursor {
        display: inline-block;
        width: 10px;
        height: 1.2rem;
        background: var(--text-color);
        animation: blink 0.8s infinite;
        vertical-align: middle;
      }
      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-2px, 2px);
          text-shadow: 2px 0 var(--error-color);
        }
        40% {
          transform: translate(-2px, -2px);
          text-shadow: -2px 0 #fff;
        }
        60% {
          transform: translate(2px, 2px);
        }
        80% {
          transform: translate(2px, -2px);
        }
        100% {
          transform: translate(0);
        }
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      a {
        color: var(--text-color);
        text-decoration: none;
        margin-top: 30px;
        border: 1px solid var(--text-color);
        padding: 10px 20px;
        transition: all 0.3s;
      }
      a:hover {
        background: var(--text-color);
        color: var(--bg-color);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <div class="error-msg">SEGMENTATION FAULT: ROUTE_NOT_FOUND</div>
      <div class="terminal">
        <div>> INITIALIZING RECOVERY PROTOCOL...</div>
        <div>> SCANNING DISK SECTORS... [FAILED]</div>
        <div>> REQUESTED_PATH: <span id="path"></span></div>
        <div>> STATUS: KERNEL_PANIC<span class="cursor"></span></div>
      </div>
      <br /><br />
      <a href="/">REBOOT TO DASHBOARD</a>
    </div>

    <script>
      document.getElementById("path").innerText = window.location.pathname;
    </script>
  </body>
</html>
