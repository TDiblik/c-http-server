<!-- Also, writing HTML is outside the scope of this project. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Monitor for MacOS</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1a1a1a;
        --text-color: #efefef;
        --accent-color: #00d2ff;
        --success-color: #43a047;
        --warning-color: #ffa000;
        --error-color: #d32f2f;
        --user-color: #2196f3;
        --sys-color: #f44336;
        --idle-color: #4caf50;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        margin-bottom: 20px;
        font-weight: 200;
        letter-spacing: 1px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 15px;
        width: 100%;
        max-width: 1400px;
      }
      .card {
        background-color: var(--card-bg);
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
      }
      .card h2 {
        margin: 0 0 10px 0;
        font-size: 1rem;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }
      .stat-group {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        align-items: flex-end;
      }
      .stat-main {
        font-size: 1.8rem;
        font-weight: 100;
      }
      .stat-details {
        font-size: 0.8rem;
        color: #aaa;
        text-align: right;
        line-height: 1.4;
      }
      .graph-container {
        height: 60px;
        width: 100%;
        margin-top: 10px;
        background: #222;
        border-radius: 4px;
        overflow: hidden;
      }
      .graph-svg {
        width: 100%;
        height: 100%;
      }
      .polyline {
        fill: none;
        stroke-width: 2;
        transition: all 0.3s ease;
      }
      .legend {
        display: flex;
        gap: 10px;
        font-size: 0.7rem;
        margin-top: 5px;
        color: #888;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <h1>System Monitor for MacOS</h1>
    <div class="grid">
      <div class="card">
        <h2>CPU Load</h2>
        <div class="stat-group">
          <div id="cpu-total" class="stat-main">0.0%</div>
          <div id="cpu-details" class="stat-details">
            User: 0%<br />System: 0%<br />Idle: 0%
          </div>
        </div>
        <div class="graph-container">
          <svg
            id="cpu-graph"
            class="graph-svg"
            viewBox="0 0 200 60"
            preserveAspectRatio="none"
          >
            <polyline
              id="cpu-line"
              class="polyline"
              stroke="var(--accent-color)"
              points=""
            ></polyline>
          </svg>
        </div>
        <div class="legend">
          <div class="legend-item">
            <div class="dot" style="background: var(--user-color)"></div>
            User
          </div>
          <div class="legend-item">
            <div class="dot" style="background: var(--sys-color)"></div>
            System
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Memory</h2>
        <div class="stat-group">
          <div id="mem-pct" class="stat-main">0.0%</div>
          <div id="mem-details" class="stat-details">
            Used: 0 GB<br />Cached: 0 GB<br />Swap: 0 GB
          </div>
        </div>
        <div class="graph-container">
          <svg
            id="mem-graph"
            class="graph-svg"
            viewBox="0 0 200 60"
            preserveAspectRatio="none"
          >
            <polyline
              id="mem-line"
              class="polyline"
              stroke="var(--success-color)"
              points=""
            ></polyline>
          </svg>
        </div>
        <div id="mem-breakdown" class="legend" style="flex-wrap: wrap">
          <div class="legend-item">
            <div class="dot" style="background: #64b5f6"></div>
            App
          </div>
          <div class="legend-item">
            <div class="dot" style="background: #ffb74d"></div>
            Wired
          </div>
          <div class="legend-item">
            <div class="dot" style="background: #81c784"></div>
            Compressed
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Network Traffic</h2>
        <div class="stat-group">
          <div id="net-total" class="stat-main">0 KB/s</div>
          <div id="net-details" class="stat-details">
            In: 0 KB/s<br />Out: 0 KB/s
          </div>
        </div>
        <div class="graph-container">
          <svg
            id="net-graph"
            class="graph-svg"
            viewBox="0 0 200 60"
            preserveAspectRatio="none"
          >
            <polyline
              id="net-rx-line"
              class="polyline"
              stroke="#2196f3"
              points=""
            ></polyline>
            <polyline
              id="net-tx-line"
              class="polyline"
              stroke="#f44336"
              points=""
            ></polyline>
          </svg>
        </div>
      </div>

      <div class="card">
        <h2>Disk: Macintosh HD</h2>
        <div class="stat-group">
          <div id="disk-pct" class="stat-main">0.0%</div>
          <div id="disk-details" class="stat-details">
            Free: 0 GB<br />Total: 0 GB
          </div>
        </div>
        <div class="graph-container" style="height: 10px; background: #333">
          <div
            id="disk-bar"
            style="
              height: 100%;
              background: var(--accent-color);
              width: 0%;
              transition: width 1s;
            "
          ></div>
        </div>
      </div>

      <div class="card">
        <h2>Battery</h2>
        <div class="stat-group">
          <div id="bat-pct" class="stat-main">0%</div>
          <div id="bat-details" class="stat-details">Status: Unknown</div>
        </div>
        <div class="graph-container" style="height: 10px; background: #333">
          <div
            id="bat-bar"
            style="
              height: 100%;
              background: var(--success-color);
              width: 0%;
              transition: width 1s;
            "
          ></div>
        </div>
      </div>

      <div class="card">
        <h2>System</h2>
        <div class="stat-group">
          <div id="uptime" class="stat-main" style="font-size: 1.2rem">
            0d 0h 0m
          </div>
        </div>
      </div>
    </div>

    <script>
      const historySize = 50;
      const graphs = {
        cpu: { line: document.getElementById("cpu-line"), data: [] },
        mem: { line: document.getElementById("mem-line"), data: [] },
        netRx: { line: document.getElementById("net-rx-line"), data: [] },
        netTx: { line: document.getElementById("net-tx-line"), data: [] },
      };

      function updateGraph(graphKey, value, max = 100) {
        const g = graphs[graphKey];
        g.data.push(value);
        if (g.data.length > historySize) g.data.shift();

        const points = g.data
          .map((v, i) => {
            const x = (i / (historySize - 1)) * 200;
            const y = 60 - (v / max) * 60;
            return `${x},${y}`;
          })
          .join(" ");
        g.line.setAttribute("points", points);
      }

      function formatBytes(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      async function tick() {
        try {
          const [cpu, mem, net, disk, bat, sys] = await Promise.all([
            fetch("/api/cpu").then((r) => r.json()),
            fetch("/api/memory").then((r) => r.json()),
            fetch("/api/network").then((r) => r.json()),
            fetch("/api/disk").then((r) => r.json()),
            fetch("/api/battery").then((r) => r.json()),
            fetch("/api/uptime").then((r) => r.json()),
          ]);

          document.getElementById("cpu-total").innerText =
            cpu.total.toFixed(1) + "%";
          document.getElementById("cpu-details").innerHTML =
            `User: ${cpu.user.toFixed(1)}%<br>System: ${cpu.system.toFixed(1)}%<br>Idle: ${cpu.idle.toFixed(1)}%`;
          updateGraph("cpu", cpu.total);

          const memUsedPct = (mem.used / mem.total) * 100;
          document.getElementById("mem-pct").innerText =
            memUsedPct.toFixed(1) + "%";
          document.getElementById("mem-details").innerHTML =
            `Used: ${formatBytes(mem.used)}<br>Cached: ${formatBytes(mem.cached)}<br>Swap: ${formatBytes(mem.swap_used)}`;
          updateGraph("mem", memUsedPct);

          const netTotal = net.rx_bps + net.tx_bps;
          document.getElementById("net-total").innerText =
            formatBytes(netTotal) + "/s";
          document.getElementById("net-details").innerHTML =
            `In: ${formatBytes(net.rx_bps)}/s<br>Out: ${formatBytes(net.tx_bps)}/s`;
          const netMax = Math.max(
            ...graphs.netRx.data,
            ...graphs.netTx.data,
            1024 * 100,
          );
          updateGraph("netRx", net.rx_bps, netMax);
          updateGraph("netTx", net.tx_bps, netMax);

          document.getElementById("disk-pct").innerText =
            disk.percentage_used.toFixed(1) + "%";
          document.getElementById("disk-details").innerHTML =
            `Free: ${formatBytes(disk.free_bytes)}<br>Total: ${formatBytes(disk.total_bytes)}`;
          document.getElementById("disk-bar").style.width =
            disk.percentage_used + "%";

          if (bat.percent !== -1) {
            document.getElementById("bat-pct").innerText = bat.percent + "%";
            document.getElementById("bat-details").innerText = bat.is_charging
              ? "Charging"
              : "Discharging";
            document.getElementById("bat-bar").style.width = bat.percent + "%";
          } else {
            document.getElementById("bat-pct").innerText = "N/A";
            document.getElementById("bat-details").innerText = "AC Power";
            document.getElementById("bat-bar").style.width = "100%";
          }

          const uptime = sys.uptime_sec;
          const d = Math.floor(uptime / 86400);
          const h = Math.floor((uptime % 86400) / 3600);
          const m = Math.floor((uptime % 3600) / 60);
          document.getElementById("uptime").innerText = `${d}d ${h}h ${m}m`;
        } catch (e) {
          console.error(e);
        }
      }

      setInterval(tick, 1000);
      tick();
    </script>
  </body>
</html>
